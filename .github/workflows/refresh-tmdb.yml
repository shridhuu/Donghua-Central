name: Refresh TMDB data
on:
  schedule:
    - cron: "0 6 * * 1"   # weekly, Monday 06:00 UTC
  workflow_dispatch:
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/fetch-tmdb.mjs
        env:
          TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git diff --quiet data/series.json || (git add data/series.json && git commit -m "chore: refresh TMDB data" && git push)
