<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Path Lost - Donghua Central</title>
    <link rel="icon" type="image/gif" href="assets/Logo/LOGO_2.gif" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800;900&family=Manrope:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --background: #030826;
        --secondary: #11172e;
        --accent: #8aa3c7;
        --highlight: #d6a84d;
        --text: #eff5ff;
        --line: rgba(239, 245, 255, 0.17);
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--background);
        color: var(--text);
        font-family: "Manrope", sans-serif;
        text-align: center;
        padding: 20px;
        overflow: hidden;
      }
      body::before {
        position: fixed;
        inset: 0;
        z-index: -1;
        content: "";
        background:
          radial-gradient(circle at center, rgba(138, 163, 199, 0.15), transparent 40rem),
          linear-gradient(180deg, #030826, #11172e);
      }
      .container {
        max-width: 500px;
        padding: 40px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(17, 23, 46, 0.8);
        backdrop-filter: blur(16px);
        box-shadow: 0 24px 90px rgba(0, 0, 0, 0.55);
      }
      h1 {
        font-family: "Cinzel", serif;
        font-size: 4rem;
        margin: 0 0 10px;
        color: var(--highlight);
        text-shadow: 0 0 20px rgba(214, 168, 77, 0.3);
      }
      h2 {
        font-family: "Cinzel", serif;
        font-size: 1.5rem;
        margin: 0 0 20px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      p {
        color: #b7c1d3;
        line-height: 1.6;
        margin-bottom: 30px;
        font-size: 0.95rem;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 28px;
        background: var(--highlight);
        color: #030826;
        border: 1px solid var(--highlight);
        border-radius: 6px;
        font-weight: 800;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 0.05em;
        cursor: pointer;
        text-decoration: none;
        transition: all 200ms ease;
      }
      .btn:hover {
        background: transparent;
        color: var(--highlight);
        box-shadow: 0 0 16px rgba(214, 168, 77, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <h2>Path of Ascension Lost</h2>
      <p>
        Junior, you have deviated from the righteous path and strayed into an unknown spatial void. This realm does not exist!
      </p>
      <a href="index.html" class="btn">Return to Mortal Realm</a>
    </div>
  </body>
</html>
